# nginx site config for proxying to backend and serving ACME challenge

server {
    listen 80;
    server_name http://antifraudmvp.duckdns.org/;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name http://antifraudmvp.duckdns.org/;

    ssl_certificate /etc/letsencrypt/live/http://antifraudmvp.duckdns.org//fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/http://antifraudmvp.duckdns.org//privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend:8000;
        proxy_read_timeout 90;
        proxy_connect_timeout 5s;
    }
}
