name: CI / Build & Deploy

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

on:
  push:
    branches: [ main, master ]

jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      MONGO_URL: ${{ secrets.MONGO_URL }}
      MONGO_DB: ${{ secrets.MONGO_DB }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute lowercase GHCR image tag
        id: set_image
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "image=ghcr.io/${repo}:${GITHUB_SHA}" >> $GITHUB_OUTPUT
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ steps.set_image.outputs.image }}

  deploy-pages:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject backend URL into frontend (if provided)
        if: ${{ secrets.BACKEND_URL != '' }}
        run: |
          echo "Injecting BACKEND_URL into src/frontend/index.html"
          BACKEND_URL=${{ secrets.BACKEND_URL }}
          # replace the empty meta content with the provided backend URL
          sed -i "s|<meta name=\"backend-base\" content=\"\" />|<meta name=\"backend-base\" content=\"${BACKEND_URL}\" />|g" src/frontend/index.html
      - name: Deploy frontend to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: src/frontend
