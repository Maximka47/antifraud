name: Deploy to EC2

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Debug: check required secrets presence"
        run: |
          set -x
          if [ -n "${{ secrets.EC2_HOST }}" ]; then echo "EC2_HOST: present"; else echo "EC2_HOST: missing"; fi
          if [ -n "${{ secrets.EC2_USER }}" ]; then echo "EC2_USER: present"; else echo "EC2_USER: missing"; fi
          if [ -n "${{ secrets.EC2_SSH_PRIVATE_KEY }}" ]; then echo "EC2_SSH_PRIVATE_KEY: present"; else echo "EC2_SSH_PRIVATE_KEY: missing"; fi
          if [ -n "${{ secrets.MONGO_URL }}" ]; then echo "MONGO_URL: present"; else echo "MONGO_URL: missing"; fi

      - name: Install rsync (for file sync)
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Start ssh-agent and add private key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 host to known_hosts
        run: |
          set -x
          mkdir -p ~/.ssh
          if [ -n "${{ secrets.EC2_HOST }}" ]; then
            ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts || true
          fi

      - name: Optionally upload .env from secrets
        run: |
          set -x
          # quick connectivity check (won't hang long thanks to ConnectTimeout)
          ssh -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'echo SSH_OK' || true
          if [ -n "${{ secrets.MONGO_URL }}" ]; then
            printf 'MONGO_URL=%s\nMONGO_DB=%s\n' "${{ secrets.MONGO_URL }}" "${{ secrets.MONGO_DB }}" > .env.deploy
            scp -o ConnectTimeout=10 -o StrictHostKeyChecking=no .env.deploy ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/.env || true
            rm .env.deploy
          fi

      - name: Sync repository to EC2 (exclude git & workflow files)
        run: |
          set -x
          ssh -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'mkdir -p ~/app' || true
          rsync -av --delete --exclude='.git' --exclude='.github' --exclude='.venv' --exclude='.env' -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10" ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/ || true

      - name: Run docker compose on EC2
        run: |
          set -x
          ssh -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'cd ~/app && docker compose pull || true && docker compose up -d --build' || true

      - name: Print backend URL reminder
        run: |
          echo 'If your EC2 has a public DNS or domain, set the repository secret BACKEND_URL to the public base URL'
