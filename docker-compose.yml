services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=${MONGO_URL}
      - MONGO_DB=${MONGO_DB}
      - BACKEND_ALLOWED_ORIGINS=https://maximka47.github.io
    volumes:
      - ./src/frontend:/app/static:ro

  mongo:
    image: mongo:8.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo_data:
